<table class="data-table" *ngIf="data.length > 0">
    <thead>
    <tr><th *ngFor="let col of columns">{{ col | titlecase }}</th></tr>
    </thead>
    <tbody>
    <tr *ngFor="let row of data">
        <td *ngFor="let col of columns">{{ row[col] }}</td>
    </tr>
    </tbody>
</table>
<p *ngIf="data.length === 0">No records found.</p>
