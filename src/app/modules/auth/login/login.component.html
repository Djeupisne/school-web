<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="logo">🎓</div>
            <h1>Bienvenue</h1>
            <p>Connectez-vous à votre espace d'administration</p>
        </div>

        <div *ngIf="error" class="alert-error">
            ⚠️ {{ error }}
        </div>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" [(ngModel)]="username" name="username"
                       placeholder="Entrez votre identifiant" required autofocus>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" [(ngModel)]="password" name="password"
                       placeholder="Entrez votre mot de passe" required>
            </div>

            <button type="submit" class="btn-primary submit-btn" [disabled]="!username || !password">
                Se connecter →
            </button>
        </form>

        <div class="demo-info">
            <p>Compte de démonstration : <code>admin</code> / <code>admin123</code></p>
        </div>
    </div>
</div>
